name: aster-release

on:
  push:
    tags:
      - "aster-v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing Aster tag to release, for example aster-v0.122.0
        required: true
        default: aster-v0.120.0

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      version: ${{ steps.validate.outputs.version }}
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}

      - name: Validate Aster release tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          [[ "${RELEASE_TAG}" =~ ^aster-v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?$ ]] \
            || { echo "Tag '${RELEASE_TAG}' must look like aster-v0.122.0"; exit 1; }
          tag_version="${RELEASE_TAG#aster-v}"
          cargo_version="$(grep -m1 '^version = ' codex-rs/Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          [[ "${tag_version}" == "${cargo_version}" ]] \
            || { echo "Tag version ${tag_version} != Cargo.toml ${cargo_version}"; exit 1; }
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${cargo_version}" >> "$GITHUB_OUTPUT"

      - name: Fetch matching upstream tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.validate.outputs.version }}"
          git fetch --no-tags https://github.com/openai/codex.git \
            "+refs/tags/rust-v${version}:refs/tags/upstream-rust-v${version}"

      - name: Check white-label boundary
        shell: bash
        run: ./scripts/aster-check-white-label-boundary --base-ref "upstream-rust-v${{ steps.validate.outputs.version }}"

  build:
    needs: validate
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-24.04
            asset_suffix: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
          - platform: macos
            runner: macos-15-xlarge
            asset_suffix: universal-apple-darwin
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
    env:
      VERSION: ${{ needs.validate.outputs.version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.validate.outputs.release_tag }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0

      - name: Install Rust targets
        shell: bash
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Build Linux binary
        if: matrix.platform == 'linux'
        shell: bash
        run: cargo build --locked --release --target x86_64-unknown-linux-gnu --bin aster

      - name: Build macOS universal binary
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target aarch64-apple-darwin --bin aster
          cargo build --locked --release --target x86_64-apple-darwin --bin aster
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/aarch64-apple-darwin/release/aster \
            target/x86_64-apple-darwin/release/aster \
            -output target/universal-apple-darwin/release/aster
          chmod +x target/universal-apple-darwin/release/aster
          lipo -info target/universal-apple-darwin/release/aster

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          package_name="aster-${VERSION}-${{ matrix.asset_suffix }}"
          stage_dir="${RUNNER_TEMP}/${package_name}"

          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            binary_path="target/x86_64-unknown-linux-gnu/release/aster"
          else
            binary_path="target/universal-apple-darwin/release/aster"
          fi

          rm -rf "${stage_dir}"
          mkdir -p "${stage_dir}"

          cp "${binary_path}" "${stage_dir}/aster"
          chmod +x "${stage_dir}/aster"
          cp "${GITHUB_WORKSPACE}/LOCAL_WHITE_LABEL.md" "${stage_dir}/README-white-label.md"
          cp "${GITHUB_WORKSPACE}/ASTER_UPSTREAM_TRACKING.env" "${stage_dir}/ASTER_UPSTREAM_TRACKING.env"

          (
            cd "${RUNNER_TEMP}"
            tar -czf "${package_name}.tar.gz" "${package_name}"
          )

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${RUNNER_TEMP}/${package_name}.tar.gz" > "${RUNNER_TEMP}/${package_name}.sha256"
          else
            shasum -a 256 "${RUNNER_TEMP}/${package_name}.tar.gz" > "${RUNNER_TEMP}/${package_name}.sha256"
          fi

          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: |
            ${{ runner.temp }}/${{ steps.package.outputs.package_name }}.tar.gz
            ${{ runner.temp }}/${{ steps.package.outputs.package_name }}.sha256

  publish:
    needs:
      - validate
      - build
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist

      - name: Write release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          notes_path="${RUNNER_TEMP}/release-notes.md"
          cat > "${notes_path}" <<EOF_NOTES
          Aster ${VERSION} builds published from this fork.

          Assets:

          - Linux x86_64 GNU: \`aster-${VERSION}-x86_64-unknown-linux-gnu.tar.gz\`
          - macOS universal Apple Darwin: \`aster-${VERSION}-universal-apple-darwin.tar.gz\`

          Linux install:

          \`\`\`bash
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/aster-${VERSION}-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf aster-${VERSION}-x86_64-unknown-linux-gnu.tar.gz
          sudo install -m 755 aster-${VERSION}-x86_64-unknown-linux-gnu/aster /usr/local/bin/aster
          aster --help
          \`\`\`

          macOS install:

          \`\`\`bash
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/aster-${VERSION}-universal-apple-darwin.tar.gz
          tar -xzf aster-${VERSION}-universal-apple-darwin.tar.gz
          sudo install -m 755 aster-${VERSION}-universal-apple-darwin/aster /usr/local/bin/aster
          aster --help
          \`\`\`

          The macOS CLI archive is unsigned and not notarized. If macOS blocks a manually downloaded binary, remove the quarantine attribute with \`xattr -d com.apple.quarantine /usr/local/bin/aster\` after you have verified the checksum.
          EOF_NOTES
          echo "path=${notes_path}" >> "$GITHUB_OUTPUT"

      - name: List release assets
        shell: bash
        run: find dist -maxdepth 3 -type f -print | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            dist/**/*.tar.gz
            dist/**/*.sha256
