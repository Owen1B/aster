name: aster-linux-package

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/aster-linux-package.yml
  workflow_dispatch:
    inputs:
      target:
        description: Linux target triple
        required: true
        default: x86_64-unknown-linux-gnu
        type: choice
        options:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target || 'x86_64-unknown-linux-gnu' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Aster (${{ inputs.target || 'x86_64-unknown-linux-gnu' }})
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: codex-rs

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ inputs.target || 'x86_64-unknown-linux-gnu' }}

      - if: ${{ (inputs.target || 'x86_64-unknown-linux-gnu') == 'x86_64-unknown-linux-musl' }}
        name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.14.0

      - if: ${{ (inputs.target || 'x86_64-unknown-linux-gnu') == 'x86_64-unknown-linux-musl' }}
        name: Install musl build tools
        env:
          TARGET: ${{ inputs.target || 'x86_64-unknown-linux-gnu' }}
        shell: bash
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - if: ${{ (inputs.target || 'x86_64-unknown-linux-gnu') == 'x86_64-unknown-linux-musl' }}
        name: Configure musl environment
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

      - name: Build Aster
        shell: bash
        run: cargo build --locked --release --target "${{ inputs.target || 'x86_64-unknown-linux-gnu' }}" --bin aster

      - name: Package release artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          package_name="aster-${version}-${{ inputs.target || 'x86_64-unknown-linux-gnu' }}"
          stage_dir="${RUNNER_TEMP}/${package_name}"

          rm -rf "${stage_dir}"
          mkdir -p "${stage_dir}"

          cp "target/${{ inputs.target || 'x86_64-unknown-linux-gnu' }}/release/aster" "${stage_dir}/aster"
          chmod +x "${stage_dir}/aster"
          cp "${GITHUB_WORKSPACE}/LOCAL_WHITE_LABEL.md" "${stage_dir}/README-white-label.md"

          (
            cd "${RUNNER_TEMP}"
            tar -czf "${package_name}.tar.gz" "${package_name}"
          )

          sha256sum "${RUNNER_TEMP}/${package_name}.tar.gz" | tee "${RUNNER_TEMP}/${package_name}.sha256"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: |
            ${{ runner.temp }}/${{ steps.package.outputs.package_name }}.tar.gz
            ${{ runner.temp }}/${{ steps.package.outputs.package_name }}.sha256
