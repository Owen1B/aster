name: aster-upstream-sync

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: Official openai/codex Rust tag, or latest-stable/latest-prerelease
        required: true
        default: latest-stable
      base_tag:
        description: Previous official Rust tag that current Aster main is based on
        required: true
        default: rust-v0.122.0
      source_ref:
        description: Aster ref to rebase onto the new upstream tag
        required: true
        default: main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.upstream_tag }}-${{ inputs.source_ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Prepare upstream patch-stack PR
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Fetch origin tags
        shell: bash
        run: git fetch --tags origin

      - name: Configure Git author
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve upstream tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag="$(./scripts/aster-sync-upstream --target '${{ inputs.upstream_tag }}' --print-tag)"
          version="${tag#rust-v}"
          branch="zhw_dev/aster-sync-${version}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

      - name: Rebase Aster patch stack
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/aster-sync-upstream \
            --target "${{ steps.resolve.outputs.tag }}" \
            --base-tag "${{ inputs.base_tag }}" \
            --source-ref HEAD \
            --branch "${{ steps.resolve.outputs.branch }}" \
            --create-branch

      - name: Check white-label boundary
        shell: bash
        run: ./scripts/aster-check-white-label-boundary --base-ref "upstream-${{ steps.resolve.outputs.tag }}"

      - name: Check for branch changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet "${{ inputs.source_ref }}"..HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: git push --force-with-lease origin "${{ steps.resolve.outputs.branch }}"

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          body_file="${RUNNER_TEMP}/aster-sync-pr.md"
          cat > "${body_file}" <<BODY
          Rebases the Aster white-label patch stack from official `${{ inputs.base_tag }}` onto official `openai/codex` `${{ steps.resolve.outputs.tag }}`.

          After this PR is merged, create and push `aster-v${{ steps.resolve.outputs.version }}` to publish the GitHub Release.
          BODY
          gh pr create \
            --title "Sync Aster with upstream ${{ steps.resolve.outputs.tag }}" \
            --body-file "${body_file}" \
            --base main \
            --head "${{ steps.resolve.outputs.branch }}"
